services:
  - type: web
    name: creator-universe-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm run render:build
    startCommand: npm run render:start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        value: https://project-limyoobins-projects.vercel.app
      - key: ALLOW_INSECURE_USER_CONTEXT
        value: "false"
